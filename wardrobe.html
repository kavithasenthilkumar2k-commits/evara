<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wardrobe Design Chennai — Evara Interiors</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    :root {
      --warm-white: #FAF8F4;
      --teal: #2A7C6F;
      --dark: #1C1916;
    }

    body { background-color: var(--warm-white); }

    /* HERO */
    .wardrobe-hero {
      position: relative;
      height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--warm-white);
      overflow: hidden;
    }
    .wardrobe-hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .wardrobe-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(28, 25, 22, 0.45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }
    .back-to-work {
      position: absolute;
      top: 120px;
      left: 6%;
      color: var(--warm-white);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid rgba(250,248,244,0.4);
      padding-bottom: 4px;
      transition: border-color 0.3s;
    }
    .back-to-work:hover { border-color: var(--teal); }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 300;
      margin-bottom: 10px;
    }
    .hero-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--teal);
    }

    /* MASONRY GALLERY */
    .gallery-container {
      padding: 0 6% 0;
      max-width: 1400px;
      margin: 0 auto;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      align-content: start;
    }
    .gallery-item {
      overflow: hidden;
      cursor: pointer;
      background: #eee;
    }
    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .gallery-item:hover img { transform: scale(1.04); }

    /* LIGHTBOX */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(28, 25, 22, 0.98);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    #lightbox.active { display: flex; }
    .lightbox-content {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    .close-lightbox {
      position: absolute;
      top: 30px;
      right: 40px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    @media (max-width: 1024px) {
    }
    @media (max-width: 768px) {
      .wardrobe-hero { height: 50vh; }
      .back-to-work {
        top: 80px !important;
        left: 5% !important;
      }

      .foyer-hero-overlay h1,
      .hero-title {
        margin-top: 40px !important;
      }
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <a href="../index.html" class="nav-logo">
      <img src="../images/logo/evara-logo.png" alt="Evara Interiors Logo" class="nav-logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"/>
      <span class="nav-logo-text" style="display:none;">EVARA</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../index.html#services">Services</a></li>
      <li><a href="../index.html#portfolio">Work</a></li>
      <li><a href="../index.html#process">Process</a></li>
      <li><a href="../index.html#awards">Awards</a></li>
      <li><a href="../index.html#reviews">Reviews</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
    <a href="#" onclick="openConsultationPopup(event)" 
    class="nav-cta mobile-cta-btn" 
    style="margin-left:auto; margin-right:12px;">Book a Free<br>Consultation</a>

    <a href="#" onclick="openConsultationPopup(event)" class="mobile-cta-btn">Book a Free<br>Consultation</a>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <section class="wardrobe-hero">
    <img src="../images/portfolio/wardrobe/1.png" alt="Wardrobe & Storage Hero" class="wardrobe-hero-img">
    <div class="wardrobe-hero-overlay">
      <a href="../projects/projects.html" class="back-to-work">← Back to Work</a>
      <h1 class="hero-title">Wardrobe & Storage</h1>
      <p class="hero-subtitle">Residential Interior — Chennai</p>
    </div>
  </section>

  <section class="gallery-container">
    <div class="gallery-grid" id="wardrobeGallery"></div>
  </section>


  <div id="lightbox">
    <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
    <img src="" alt="Wardrobe Design Detail" class="lightbox-content" id="lightbox-img">
  </div>

  <div id="shared-footer"></div>
  <script>
    fetch('../footer.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('shared-footer').innerHTML = html;
      });
  </script>

  <script src="../script.js"></script>
  <script>
    // Populate Gallery 1 to 18
    const galleryGrid = document.getElementById('wardrobeGallery');
    for (let i = 1; i <= 18; i++) {
      if (i >= 15 && i <= 18) continue; // Skip images 15, 16, 17, 18 as requested
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.onclick = () => openLightbox(`../images/portfolio/wardrobe/${i}.png`);
      
      const img = document.createElement('img');
      img.src = `../images/portfolio/wardrobe/${i}.png`;
      img.alt = `Wardrobe Design ${i}`;
      img.loading = 'lazy';
      
      item.appendChild(img);
      galleryGrid.appendChild(item);
    }

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
<div id="consultationPopup" class="consultation-popup-overlay">
  <div class="consultation-popup-modal">
    <button class="popup-close-btn" onclick="closeConsultationPopup()" aria-label="Close">&times;</button>
    <p class="popup-tag">GET IN TOUCH</p>
    <h3 class="popup-title">Book a Free Consultation</h3>
    <form class="popup-form" id="popupConsultationForm">
      <div class="popup-form-row">
        <div class="popup-form-group">
          <label>YOUR NAME *</label>
          <input type="text" id="popupName" name="name" placeholder="Eg. Priya Sharma" required />
        </div>
        <div class="popup-form-group">
          <label>PHONE NUMBER *</label>
          <input type="tel" id="popupPhone" name="phone" placeholder="+91 98765 43210" required />
        </div>
      </div>
      <div class="popup-form-group">
        <label>EMAIL ADDRESS *</label>
        <input type="email" id="popupEmail" name="email" placeholder="you@email.com" required />
      </div>
      <div class="popup-form-row">
        <div class="popup-form-group">
          <label>PROPERTY LOCATION *</label>
          <select id="popupLocation" name="location" required>
            <option value="" disabled selected>Select location</option>
            <option value="Chennai">Chennai</option>
            <option value="Outside Chennai">Outside Chennai</option>
          </select>
        </div>
        <div class="popup-form-group">
          <label>PROPERTY TYPE *</label>
          <select id="popupPropertyType" name="propertyType" required>
            <option value="" disabled selected>Select type</option>
            <option value="Commercial">Commercial</option>
            <option value="Independent Residential">Independent Residential</option>
            <option value="Villa">Villa</option>
            <option value="Apartment 2BHK">Apartment 2BHK</option>
            <option value="Apartment 3BHK">Apartment 3BHK</option>
            <option value="Apartment 4BHK+">Apartment 4BHK+</option>
          </select>
        </div>
      </div>
      <input type="text" name="_gotcha" style="display:none" />
      <button type="submit" class="btn-primary popup-submit-btn">Send Enquiry</button>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
        <input type="checkbox" id="popup-updates" name="updates" 
        style="width:16px;height:16px;cursor:pointer;accent-color:#2A7C6F;"/>
        <label for="popup-updates" style="font-family:'DM Sans',sans-serif;
        font-size:0.85rem;color:#1C1916;cursor:pointer;">
        Send me updates on Email & WhatsApp</label>
      </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
          <input type="checkbox" id="modal-updates" name="updates" 
          style="width:16px;height:16px;cursor:pointer;accent-color:#2A7C6F;"/>
          <label for="modal-updates" style="font-family:'DM Sans',sans-serif;
          font-size:0.85rem;color:#1C1916;cursor:pointer;">
          Send me updates on Email & WhatsApp</label>
        </div>
      <p class="popup-terms">By submitting, you agree to our <a href="../terms.html" target="_blank">Terms & Conditions</a></p>
    </form>
  </div>
</div>

<script>
function openConsultationPopup(e) {
  if(e) e.preventDefault();
  document.getElementById('consultationPopup').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeConsultationPopup() {
  document.getElementById('consultationPopup').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('consultationPopup').addEventListener('click', function(e) {
  if(e.target === this) closeConsultationPopup();
});
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') closeConsultationPopup();
});
const popupForm = document.getElementById('popupConsultationForm');
if(popupForm) {
  popupForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const payload = {
      "Timestamp": new Date().toLocaleString('en-IN'),
      "Name": document.getElementById('popupName')?.value || '',
      "Phone": document.getElementById('popupPhone')?.value || '',
      "Email": document.getElementById('popupEmail')?.value || '',
      "WhatsApp Number": '',
      "Property Location": document.getElementById('popupLocation')?.value || '',
      "Property Type": document.getElementById('popupPropertyType')?.value || '',
      "Source": "Popup Form"
    };
    fetch('https://corsproxy.io/?' + encodeURIComponent('https://hook.eu1.make.com/qi8o4y1zdt79iaqgmpekp9mc1nf2h4ou'), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).then(() => {
      closeConsultationPopup();
      alert('Thank you! We will get back to you soon.');
      popupForm.reset();
    }).catch(() => {
      alert('Thank you! We will get back to you soon.');
      popupForm.reset();
    });
  });
}
</script>
</body>
</html>

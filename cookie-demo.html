<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cookie Banner Demo</title>
  <style>
    body{font-family:Arial, sans-serif;}
    .cookie-banner{position:fixed;left:0;right:0;bottom:0;background:#0f172a;color:#e5e7eb;padding:12px 16px;display:flex;justify-content:center;}
    .cookie-inner{max-width:1100px;width:100%;display:flex;gap:12px;align-items:center;justify-content:space-between;}
    .cookie-actions{display:flex;gap:10px;align-items:center;}
    .cookie-btn{background:#22c55e;border:none;color:#062013;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:700;}
    .cookie-link{color:#93c5fd;text-decoration:underline;}
  </style>
</head>
<body>
  <div class="cookie-banner" id="cookieBanner">
    <div class="cookie-inner">
      <div>We use cookies to improve your experience.</div>
      <div class="cookie-actions">
        <button class="cookie-btn" id="cookieAccept">Accept</button>
        <a class="cookie-link" href="privacy.html">Learn more</a>
      </div>
    </div>
  </div>
  <script>
    const banner=document.getElementById('cookieBanner');
    const accept=document.getElementById('cookieAccept');
    const key='cookieAccepted';
    if(localStorage.getItem(key)==='true'){banner.style.display='none';}
    accept.addEventListener('click',()=>{localStorage.setItem(key,'true');banner.style.display='none';});
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionnaire — EVARA Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/portal.css">
  <link rel="icon" type="image/png" href="../../../images/logo/evara-logo.png">
  <style>
    .q-intro-box {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--teal-light); border: 1px solid var(--teal);
      border-radius: 4px; padding: 12px 16px; margin-bottom: 24px;
      font-size: 13px; color: var(--teal-bg); line-height: 1.6;
    }
    .q-intro-box svg { width: 16px; height: 16px; stroke: var(--teal); fill: none; stroke-width: 1.5; flex-shrink: 0; margin-top: 2px; }
    .question-block {
      display: flex; gap: 18px;
      margin-bottom: 24px; padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .question-block:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .question-num-col {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--teal-light); border: 1.5px solid var(--teal);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; color: var(--teal); margin-top: 2px;
    }
    .question-body { flex: 1; min-width: 0; }
    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 500;
      color: var(--dark); margin-bottom: 10px; line-height: 1.5;
    }
    .answer-area {
      width: 100%; min-height: 48px; max-height: 300px;
      padding: 10px 13px; border: 1px solid var(--border); border-radius: 3px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--dark);
      line-height: 1.6; resize: vertical; background: var(--warm-white);
      transition: border 0.2s, background 0.2s; box-sizing: border-box;
    }
    .answer-area:focus { outline: none; border-color: var(--teal); background: var(--white); }
    .answer-area::placeholder { color: var(--text-muted); }
    .answered-at { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    .save-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); gap: 12px;
    }
    .save-status { font-size: 12px; color: var(--text-muted); flex: 1; }
    .save-status.saved { color: var(--teal); }
    .save-status.error { color: #C62828; }
    .sidebar {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
}
.sidebar-footer {
  flex-shrink: 0;
}
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="portal-layout">

  <aside class="sidebar" id="sidebar">
    <a href="https://www.evarainteriors.in" target="_blank" class="sidebar-logo" style="text-decoration:none; display:block;">
  <div class="sidebar-logo-name">EVARA INTERIORS</div>
  <div class="sidebar-logo-tag">Client Portal</div>
</a>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarName">—</div>
      <div class="sidebar-user-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <a href="client-home.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
      </a>
      <a href="client-contract.html" class="nav-item" id="navContract">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Contract
      </a>
      <a href="client-moodboard.html" class="nav-item" id="navMoodBoard">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>Mood Board
      </a>
      <a href="client-3ddesign.html" class="nav-item" id="navDesign3d">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>3D Design
      </a>
      <a href="client-questionnaire.html" class="nav-item active" id="navQuestionnaire">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Questionnaire
      </a>
      <a href="client-quotation.html" class="nav-item" id="navQuotation">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Quotation
      </a>
      <a href="client-workschedule.html" class="nav-item" id="navWorkSchedule">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Work Schedule
      </a>
      <a href="client-payments.html" class="nav-item" id="navPayments">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Payments
      </a>
      <a href="client-contacts.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contacts
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="signout-btn" id="signoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Questionnaire</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="pageDate"></span>
        <span class="badge" id="statusBadge" style="display:none;"></span>
      </div>
    </div>

    <div class="page-body">
      <div class="card" id="questionnaireContent">
        <div style="font-size:12px; color:var(--text-muted);">Loading...</div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc, collection, query, orderBy, onSnapshot, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

document.getElementById('pageDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await signOut(auth); window.location.href = '../index.html';
});

let currentUser = null;
let questionsData = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../index.html'; return; }

  // Admin guard
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (adminDoc.exists()) { window.location.href = 'dashboard.html'; return; }

  currentUser = user;

  const clientSnap = await getDoc(doc(db, 'clients', user.uid));
  if (!clientSnap.exists()) { window.location.href = '../index.html'; return; }
  const client = clientSnap.data();

  document.getElementById('sidebarName').textContent = client.displayName || 'Client';

  const badge = document.getElementById('statusBadge');
  const status = client.projectStatus || 'Planning';
  badge.textContent = status;
  badge.className = 'badge ' + (status === 'Completed' ? 'badge-completed' : status === 'In Progress' ? 'badge-progress' : 'badge-planning');
  badge.style.display = 'inline-block';

  const vis = client.visibility || {};

  // If questionnaire not enabled, redirect home
  if (!vis.questionnaire) { window.location.href = 'client-home.html'; return; }

  applyVisibility(vis);

  // Load questions (live updates)
  const q = query(collection(db, 'clients', user.uid, 'questionnaire'), orderBy('order', 'asc'));
  const container = document.getElementById('questionnaireContent');

  onSnapshot(q, (snap) => {
    if (snap.empty) {
      questionsData = [];
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <p class="empty-state-text">No questions added yet.</p>
        </div>`;
      return;
    }

    const newData = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Only re-render if the set of questions (ids/order/text) actually changed,
    // not just when answeredAt/answerText changes from our own saves —
    // this avoids wiping out in-progress typing.
    const structureChanged =
      newData.length !== questionsData.length ||
      newData.some((nq, i) => {
        const oq = questionsData[i];
        return !oq || oq.id !== nq.id || oq.questionText !== nq.questionText;
      });

    questionsData = newData;

    if (structureChanged || !document.getElementById('questionsList')) {
      renderQuestions();
    }
  });
});

function renderQuestions() {
  const container = document.getElementById('questionnaireContent');
  container.innerHTML = `
    <div class="q-intro-box">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Please take a moment to answer these questions. Your responses help us personalise your design experience. You can edit your answers anytime.
    </div>
    <div id="questionsList"></div>
    <div class="save-bar">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn btn-primary" id="saveBtn">Save Answers</button>
    </div>`;

  const list = document.getElementById('questionsList');

  questionsData.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    const answeredDate = q.answeredAt
      ? 'Last answered: ' + q.answeredAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      : '';
    block.innerHTML = `
      <div class="question-num-col">${i + 1}</div>
      <div class="question-body">
        <div class="question-text">${q.questionText}</div>
        <textarea class="answer-area" id="answer-${q.id}" placeholder="Type your answer here..." rows="2">${q.answerText || ''}</textarea>
        ${answeredDate ? `<div class="answered-at">${answeredDate}</div>` : ''}
      </div>`;
    list.appendChild(block);
  });

  // Auto-resize textareas
  container.querySelectorAll('.answer-area').forEach(ta => {
    const originalValue = ta.value;
    const resize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };
    ta.addEventListener('input', resize);
    ta.addEventListener('blur', async function() {
      const id = this.id.replace('answer-', '');
      if (!id) return;
      if (this.value.trim() === originalValue.trim()) return; // no change, skip
      await updateDoc(doc(db, 'clients', currentUser.uid, 'questionnaire', id), {
        answerText: this.value.trim(),
        answeredAt: serverTimestamp()
      });
    });
    resize();
  });

  document.getElementById('saveBtn').addEventListener('click', saveAnswers);
}

async function saveAnswers() {
  const btn    = document.getElementById('saveBtn');
  const status = document.getElementById('saveStatus');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    await Promise.all(questionsData.map(q => {
      const ta = document.getElementById('answer-' + q.id);
      return updateDoc(doc(db, 'clients', currentUser.uid, 'questionnaire', q.id), {
        answerText: ta ? ta.value.trim() : '',
        answeredAt: serverTimestamp()
      });
    }));

    status.textContent = '✓ Answers saved successfully.';
    status.className = 'save-status saved';
    btn.textContent = 'Save Answers';
    btn.disabled = false;

  } catch (e) {
    status.textContent = 'Something went wrong. Please try again.';
    status.className = 'save-status error';
    btn.textContent = 'Save Answers';
    btn.disabled = false;
  }
}

function applyVisibility(vis) {
  const map = { contract:'navContract', moodBoard:'navMoodBoard', design3d:'navDesign3d', quotation:'navQuotation', workSchedule:'navWorkSchedule', payments:'navPayments', questionnaire:'navQuestionnaire' };
  Object.entries(map).forEach(([key, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = vis[key] !== false ? 'flex' : 'none';
  });
}
/* ── Disable browser back/forward ── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.go(1); // cancel the back navigation by going forward again
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    window.location.reload();
  }
});
</script>
</body>
</html>

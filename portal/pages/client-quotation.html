<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotation — EVARA Client Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/portal.css">
  <link rel="icon" type="image/png" href="../../../images/logo/evara-logo.png">
  <style>
    .quotation-list { display: flex; flex-direction: column; gap: 12px; }
    .quotation-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: border-color 0.15s;
    }
    .quotation-card:hover { border-color: var(--teal); }
    .q-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .q-icon {
      width: 40px; height: 40px; border-radius: 4px;
      background: var(--teal-light); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .q-icon svg { width: 20px; height: 20px; stroke: var(--teal); fill: none; stroke-width: 1.5; }
    .q-info { min-width: 0; }
    .q-name {
      font-size: 14px; font-weight: 500;
      color: var(--dark);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .q-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .q-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 28px; }
    .version-badge {
      font-size: 10px; font-weight: 500;
      background: var(--teal-light); color: var(--teal);
      padding: 2px 8px; border-radius: 20px;
      margin-left: 8px; vertical-align: middle;
    }
    @media (max-width: 600px) {
      .quotation-card { flex-direction: column; align-items: flex-start; }
      .q-actions { width: 100%; margin-top: 16px; }
      .q-actions .btn { flex: 1; justify-content: center; }
    }
    .sidebar {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
}
.sidebar-footer {
  flex-shrink: 0;
}
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="portal-layout">

  <aside class="sidebar" id="sidebar">
    <a href="https://www.evarainteriors.in" target="_blank" class="sidebar-logo" style="text-decoration:none; display:block;">
  <div class="sidebar-logo-name">EVARA INTERIORS</div>
  <div class="sidebar-logo-tag">Client Portal</div>
</a>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarName">—</div>
      <div class="sidebar-user-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <a href="client-home.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
      </a>
      <a href="client-contract.html" class="nav-item" id="navContract">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Contract
      </a>
      <a href="client-moodboard.html" class="nav-item" id="navMoodBoard">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>Mood Board
      </a>
      <a href="client-3ddesign.html" class="nav-item" id="navDesign3d">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>3D Design
      </a>
      <a href="client-questionnaire.html" class="nav-item" id="navQuestionnaire" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Questionnaire
      </a>
      <a href="client-quotation.html" class="nav-item active" id="navQuotation">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Quotation
      </a>
      <a href="client-workschedule.html" class="nav-item" id="navWorkSchedule">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Work Schedule
      </a>
      <a href="client-payments.html" class="nav-item" id="navPayments">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Payments
      </a>
      <a href="client-contacts.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contacts
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="signout-btn" id="signoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Quotation</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="pageDate"></span>
        <span class="badge" id="statusBadge" style="display:none;"></span>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="card-title">Quotation Documents</div>
        <div id="quotationList" class="quotation-list">
          <div id="loadingState" style="font-size:12px; color:var(--text-muted);">Loading...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-outline, .btn-primary {
  min-width: 110px;
  justify-content: center;
}
  @media (max-width: 768px) {
  .btn-outline, .btn-primary {
    min-width: 50px;
    font-size: 11px;
    padding: 8px 12px;
  }
}
</style>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc, collection, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

document.getElementById('pageDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await signOut(auth); window.location.href = '../index.html';
});

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../index.html'; return; }

  // Admin guard
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (adminDoc.exists()) { window.location.href = 'dashboard.html'; return; }

  // Client doc
  const clientSnap = await getDoc(doc(db, 'clients', user.uid));
  if (!clientSnap.exists()) { window.location.href = '../index.html'; return; }
  const client = clientSnap.data();

  document.getElementById('sidebarName').textContent = client.displayName || 'Client';

  const badge = document.getElementById('statusBadge');
  const status = client.projectStatus || 'Planning';
  badge.textContent = status;
  badge.className = 'badge ' + (status === 'Completed' ? 'badge-completed' : status === 'In Progress' ? 'badge-progress' : 'badge-planning');
  badge.style.display = 'inline-block';

  applyVisibility(client.visibility || {});

  // Load quotations
  const q = query(collection(db, 'clients', user.uid, 'quotations'), orderBy('uploadedAt', 'asc'));
  onSnapshot(q, (snap) => {
    const list = document.getElementById('quotationList');
    if (snap.empty) {
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p class="empty-state-text">No documents uploaded till now.</p>
        </div>`;
      return;
    }

    list.innerHTML = '';
    let idx = 1;
    snap.forEach(d => {
      const qt = d.data();
      const date = qt.uploadedAt
        ? qt.uploadedAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : '';
      const card = document.createElement('div');
      card.className = 'quotation-card';
      card.innerHTML = `
        <div class="q-left">
          <div class="q-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="q-info">
            <div class="q-name">${qt.versionName || 'Quotation ' + idx}<span class="version-badge">v${idx}</span></div>
            <div class="q-date">${date}${qt.fileSize ? ' · ' + qt.fileSize : ''}</div>
          </div>
        </div>
       <div class="q-actions">
  <a href="${qt.fileUrl}" target="_blank" class="btn btn-primary">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    View & Download
  </a>
</div>`;
      list.appendChild(card);
      idx++;
    });
  });
});

function applyVisibility(vis) {
  const map = { contract:'navContract', moodBoard:'navMoodBoard', design3d:'navDesign3d', quotation:'navQuotation', workSchedule:'navWorkSchedule', payments:'navPayments', questionnaire:'navQuestionnaire' };
  Object.entries(map).forEach(([key, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = vis[key] !== false ? 'flex' : 'none';
  });
}
/* ── Disable browser back/forward ── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.go(1); // cancel the back navigation by going forward again
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    window.location.reload();
  }
});
</script>
</body>
</html>

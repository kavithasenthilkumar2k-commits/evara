<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Schedule — EVARA Client Portal</title>
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="icon" type="image/png" href="../../../images/logo/evara-logo.png">
</head>
<body>

<div id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="portal-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a href="https://www.evarainteriors.in" target="_blank" class="sidebar-logo" style="text-decoration:none; display:block;">
  <div class="sidebar-logo-name">EVARA INTERIORS</div>
  <div class="sidebar-logo-tag">Client Portal</div>
</a>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarClientName">—</div>
      <div class="sidebar-user-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="client-home.html">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </a>
      <a class="nav-item" id="navContract" href="client-contract.html">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Contract
      </a>
      <a class="nav-item" id="navMoodBoard" href="client-moodboard.html">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>
        Mood Board
      </a>
      <a class="nav-item" id="navDesign3d" href="client-3ddesign.html">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        3D Design
      </a>
      <a class="nav-item" id="navQuestionnaire" href="client-questionnaire.html" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Questionnaire
      </a>
      <a class="nav-item" id="navQuotation" href="client-quotation.html">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Quotation
      </a>
      <a class="nav-item active" id="navWorkSchedule" href="client-workschedule.html">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Work Schedule
      </a>
      <a class="nav-item" id="navPayments" href="client-payments.html">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Payments
      </a>
      <a class="nav-item" href="client-contacts.html">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Contacts
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="signout-btn" id="signoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">Work Schedule</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="topbarDate"></span>
        <span class="badge badge-progress" id="statusBadge" style="display:none;"></span>
      </div>
    </div>

    <div class="page-body">

      <!-- LOADING -->
      <div id="loadingState" style="display:flex; align-items:center; justify-content:center; height:60vh;">
        <div style="text-align:center; color:var(--text-muted);">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite; margin-bottom:12px;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <div style="font-size:12px;">Loading schedule...</div>
        </div>
      </div>

      <!-- CONTENT -->
      <div id="pageBody" style="display:none;">
        <div class="card">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
            Project Task Schedule
            <span id="taskSummary" style="font-size:11px; color:var(--text-muted);"></span>
          </div>

          <!-- EMPTY STATE -->
          <div id="emptyState" class="empty-state" style="display:none;">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div class="empty-state-text">No documents uploaded till now.</div>
          </div>

          <!-- TABLE -->
          <div id="tableWrap" style="overflow-x:auto; display:none;">
            <table class="ws-table" id="scheduleTable">
              <thead>
                <tr>
                  <th style="width:36px;">S.No</th>
<th style="width:45%;">Task</th>
<th style="width:90px; white-space:nowrap;">Expected Date</th>
<th>Scope</th>
<th style="width:56px; text-align:center;">Done</th>
                </tr>
              </thead>
              <tbody id="scheduleBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .date-cell-wrap { display: flex; align-items: center; gap: 6px; }
  .date-display { font-size: 12px; color: var(--text-muted); }
  .cal-icon { display: none; color: var(--teal); flex-shrink: 0; line-height: 1; }
  .date-cell-wrap:hover .cal-icon { display: flex; }
  .task-done-text { color: var(--text-muted); text-decoration: line-through; }
  .tick-done {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--teal);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  .tick-done svg { width: 12px; height: 12px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .tick-pending {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--border);
    margin: 0 auto;
  }
  .date-display {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}
  @media (max-width: 768px) {
  .ws-table td {
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    padding-top: 10px;
  }
  #taskSummary {
    display: block;
    white-space: normal;
    max-width: 60px;
    text-align: right;
    line-height: 1.4;
  }
  .ws-table th:nth-child(2) {
    text-align: center;
  }
  }
  @media (max-width: 768px) {
  .card-title {
    font-size: 14px !important;
  }
  #taskSummary {
    display: block;
    white-space: normal;
    max-width: 80px;
    text-align: right;
    line-height: 1.4;
    font-size: 10px !important;
  }
  }
.sidebar {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
}
.sidebar-footer {
  flex-shrink: 0;
}
</style>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

// MOBILE SIDEBAR
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});

// SIGN OUT
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = '../index.html';
});

let clientId = null;

// AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../index.html'; return; }
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (adminDoc.exists()) { window.location.href = 'dashboard.html'; return; }
  clientId = user.uid;
  loadData();
});

function loadData() {
  // Load client doc for sidebar name, status, visibility
  onSnapshot(doc(db, 'clients', clientId), (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    document.getElementById('sidebarClientName').textContent = d.displayName || '—';

    const badge = document.getElementById('statusBadge');
    const status = d.projectStatus || 'Planning';
    badge.textContent = status;
    badge.className = 'badge ' + (status === 'Completed' ? 'badge-completed' : status === 'In Progress' ? 'badge-progress' : 'badge-planning');
    badge.style.display = 'inline-block';

    applyVisibility(d.visibility || {});
  });

  // Load work schedule
  const q = collection(db, 'clients', clientId, 'workSchedule');
  onSnapshot(q, (snap) => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageBody').style.display = 'block';

    if (snap.empty) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('tableWrap').style.display = 'none';
      document.getElementById('taskSummary').textContent = '';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('tableWrap').style.display = 'block';

    const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.sno || 0) - (b.sno || 0));
    const done  = rows.filter(r => r.isDone).length;
    const total = rows.length;
    document.getElementById('taskSummary').textContent = `${done}/${total} TASKS COMPLETED`;


    const tbody = document.getElementById('scheduleBody');
    tbody.innerHTML = '';

    rows.forEach((row, i) => {
      const dateDisplay = row.expectedDate
        ? new Date(row.expectedDate).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--text-muted); text-align:center;">${row.sno || i+1}</td>
        <td class="${row.isDone ? 'task-done-text' : ''}">${row.task || '—'}</td>
        <td>
          <div class="date-cell-wrap" style="position:relative;">
            <span class="date-display">${dateDisplay}</span>
            ${row.expectedDate ? `<span class="cal-icon" data-date="${row.expectedDate}" onclick="toggleCalPopup(this)" title="View date">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <div class="cal-popup" style="display:none; position:absolute; top:110%; left:0; z-index:100; background:white; border:1px solid var(--teal); box-shadow:0 4px 16px rgba(0,0,0,0.12); padding:12px; min-width:200px; border-radius:4px;">
              <div class="cal-month-label" style="font-size:12px; font-weight:500; color:var(--dark); margin-bottom:8px; text-align:center;"></div>
              <div class="cal-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; font-size:11px;">
                ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div style="color:var(--text-muted); padding:2px;">${d}</div>`).join('')}
              </div>
              <div class="cal-days-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; font-size:11px; margin-top:2px;"></div>
            </div>` : ''}
          </div>
        </td>
        <td style="font-size:12px; color:var(--text-muted);">${row.scope || '—'}</td>
        <td style="text-align:center;">
          ${row.isDone
            ? `<div class="tick-done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>`
            : `<div class="tick-pending"></div>`}
        </td>`;
      tbody.appendChild(tr);
    });
  });
}

// close all cal popups when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.cal-icon') && !e.target.closest('.cal-popup')) {
    document.querySelectorAll('.cal-popup').forEach(p => p.style.display = 'none');
  }
});

window.toggleCalPopup = function(iconEl) {
  const popup = iconEl.nextElementSibling;
  const isOpen = popup.style.display === 'block';
  document.querySelectorAll('.cal-popup').forEach(p => p.style.display = 'none');
  if (!isOpen) {
    const dateStr = iconEl.dataset.date;
    if (!dateStr) return;
    const d = new Date(dateStr);
    const year = d.getFullYear();
    const month = d.getMonth();
    const day = d.getDate();
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    popup.querySelector('.cal-month-label').textContent = monthNames[month] + ' ' + year;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = popup.querySelector('.cal-days-grid');
    grid.innerHTML = '';
    for (let b = 0; b < firstDay; b++) grid.innerHTML += '<div></div>';
    for (let i = 1; i <= daysInMonth; i++) {
      const isTarget = i === day;
      grid.innerHTML += '<div style="padding:3px; border-radius:50%; ' + (isTarget ? 'background:var(--teal); color:white; font-weight:500;' : 'color:var(--text-body);') + '">' + i + '</div>';
    }
    popup.style.display = 'block';
  }
};

function applyVisibility(vis) {
  const map = {
    contract:     'navContract',
    moodBoard:    'navMoodBoard',
    design3d:     'navDesign3d',
    quotation:    'navQuotation',
    workSchedule: 'navWorkSchedule',
    payments:     'navPayments',
    questionnaire:'navQuestionnaire',
  };
  Object.entries(map).forEach(([key, navId]) => {
    const el = document.getElementById(navId);
    if (!el) return;
    el.style.display = vis[key] !== false ? 'flex' : 'none';
  });
}
/* ── Disable browser back/forward ── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.go(1); // cancel the back navigation by going forward again
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    window.location.reload();
  }
});
</script>

</body>
</html>

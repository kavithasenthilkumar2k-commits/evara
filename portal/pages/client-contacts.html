<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts — EVARA Client Portal</title>
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="icon" type="image/png" href="../../../images/logo/evara-logo.png">
</head>
<body>
<div id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="portal-layout">

  <aside class="sidebar" id="sidebar">
    <a href="https://www.evarainteriors.in" target="_blank" class="sidebar-logo" style="text-decoration:none; display:block;">
  <div class="sidebar-logo-name">EVARA INTERIORS</div>
  <div class="sidebar-logo-tag">Client Portal</div>
</a>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarClientName">—</div>
      <div class="sidebar-user-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="client-home.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
      <a class="nav-item" id="navContract" href="client-contract.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Contract</a>
      <a class="nav-item" id="navMoodBoard" href="client-moodboard.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>Mood Board</a>
      <a class="nav-item" id="navDesign3d" href="client-3ddesign.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>3D Design</a>
      <a class="nav-item" id="navQuestionnaire" href="client-questionnaire.html" style="display:none;"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Questionnaire</a>
      <a class="nav-item" id="navQuotation" href="client-quotation.html"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Quotation</a>
      <a class="nav-item" id="navWorkSchedule" href="client-workschedule.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Work Schedule</a>
      <a class="nav-item" id="navPayments" href="client-payments.html"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Payments</a>
      <a class="nav-item active" href="client-contacts.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contacts</a>
    </nav>
    <div class="sidebar-footer">
      <button class="signout-btn" id="signoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">Contacts</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="topbarDate"></span>
        <span class="badge badge-progress" id="statusBadge" style="display:none;"></span>
      </div>
    </div>

    <div class="page-body">

      <div id="loadingState" style="display:flex;align-items:center;justify-content:center;height:60vh;">
        <div style="text-align:center;color:var(--text-muted);">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;margin-bottom:12px;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <div style="font-size:12px;">Loading...</div>
        </div>
      </div>

      <div id="pageBody" style="display:none;">
        <div class="card">
          <div class="card-title">Points of Contact</div>
          <div id="contactsList" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px;"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }

  .contact-card-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 12px;
  padding: 28px 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--white);
  transition: border-color 0.15s;
}
  .contact-card-box:last-child { margin-bottom: 0; }
  .contact-card-box:hover { border-color: var(--teal); }

  .contact-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--teal-dark);
    font-weight: 500;
    flex-shrink: 0;
  }

  .contact-name  { font-size: 16px; font-weight: 500; color: var(--dark); margin-bottom: 4px; }
  .contact-desig { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .contact-links { display: flex; flex-direction: column; gap: 10px; }

  .contact-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--teal);
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .contact-link:hover { opacity: 0.75; }
  .contact-link svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }
  .sidebar {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
}
.sidebar-footer {
  flex-shrink: 0;
}
</style>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc, collection, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await signOut(auth); window.location.href = '../index.html';
});

let clientId = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../index.html'; return; }
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (adminDoc.exists()) { window.location.href = 'dashboard.html'; return; }
  clientId = user.uid;
  loadData();
});

function loadData() {
  onSnapshot(doc(db, 'clients', clientId), (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    document.getElementById('sidebarClientName').textContent = d.displayName || '—';
    const badge = document.getElementById('statusBadge');
    const status = d.projectStatus || 'Design Phase';
    badge.textContent = status;
    badge.className = 'badge ' + (status === 'Completed' ? 'badge-completed' : status === 'Site Progress' ? 'badge-progress' : 'badge-planning');
    badge.style.display = 'inline-block';
    applyVisibility(d.visibility || {});
  });

  const q = query(collection(db, 'clients', clientId, 'contacts'), orderBy('order', 'asc'));
  onSnapshot(q, (snap) => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageBody').style.display = 'block';

    const list = document.getElementById('contactsList');
    list.innerHTML = '';

    if (snap.empty) {
      // Show Priyanka's default even if no contacts saved yet
      list.innerHTML = buildCard({
        name: 'Ar. Priyanka Nagarajan',
        designation: 'Principal Architect & Designer',
        phone: '+91 62825 74047',
        email: 'evarainteriors@gmail.com'
      });
      return;
    }

    snap.docs.forEach(d => {
      list.innerHTML += buildCard(d.data());
    });
  });
}

function buildCard(c) {
  const initials = (c.name || 'P').split(' ').filter(w => /^[A-Za-z]/.test(w)).map(w => w[0]).join('').slice(0,2).toUpperCase();
  return `
    <div class="contact-card-box">
      <div class="contact-avatar">${initials}</div>
      <div style="width:100%;">
        <div class="contact-name">${c.name || '—'}</div>
        <div class="contact-desig">${c.designation || ''}</div>
        <div class="contact-links">
          ${c.phone ? `<a href="tel:${c.phone}" class="contact-link">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.92a16 16 0 0 0 6 6l.43-.25a2 2 0 0 1 2.11.44c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${c.phone}
          </a>` : ''}
          ${c.email ? `<a href="mailto:${c.email}" class="contact-link">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            ${c.email}
          </a>` : ''}
        </div>
      </div>
    </div>`;
}

function applyVisibility(vis) {
  const map = { contract:'navContract', moodBoard:'navMoodBoard', design3d:'navDesign3d', quotation:'navQuotation', workSchedule:'navWorkSchedule', payments:'navPayments', questionnaire:'navQuestionnaire' };
  Object.entries(map).forEach(([key, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = vis[key] !== false ? 'flex' : 'none';
  });
}

  /* ── Disable browser back/forward ── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.go(1); // cancel the back navigation by going forward again
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    window.location.reload();
  }
});
</script>
</body>
</html>

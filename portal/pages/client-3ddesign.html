<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Design — EVARA Client Portal</title>
  <link rel="stylesheet" href="../css/portal.css" />
  <link rel="icon" type="image/png" href="../../../images/logo/evara-logo.png">
</head>
<body>
<div id="toast"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="portal-layout">

  <aside class="sidebar" id="sidebar">
    <a href="https://www.evarainteriors.in" target="_blank" class="sidebar-logo" style="text-decoration:none; display:block;">
  <div class="sidebar-logo-name">EVARA INTERIORS</div>
  <div class="sidebar-logo-tag">Client Portal</div>
</a>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarClientName">—</div>
      <div class="sidebar-user-role">Client</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="client-home.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
      <a class="nav-item" id="navContract" href="client-contract.html"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Contract</a>
      <a class="nav-item" id="navMoodBoard" href="client-moodboard.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg>Mood Board</a>
      <a class="nav-item active" id="navDesign3d" href="client-3ddesign.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>3D Design</a>
      <a class="nav-item" id="navQuestionnaire" href="client-questionnaire.html" style="display:none;"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Questionnaire</a>
      <a class="nav-item" id="navQuotation" href="client-quotation.html"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Quotation</a>
      <a class="nav-item" id="navWorkSchedule" href="client-workschedule.html"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Work Schedule</a>
      <a class="nav-item" id="navPayments" href="client-payments.html"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Payments</a>
      <a class="nav-item" href="client-contacts.html"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contacts</a>
    </nav>
    <div class="sidebar-footer">
      <button class="signout-btn" id="signoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
      </button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">3D Design</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="topbarDate"></span>
        <span class="badge badge-progress" id="statusBadge" style="display:none;"></span>
      </div>
    </div>

    <div class="page-body">
      <div id="loadingState" style="display:flex;align-items:center;justify-content:center;height:60vh;">
        <div style="text-align:center;color:var(--text-muted);">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;margin-bottom:12px;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <div style="font-size:12px;">Loading...</div>
        </div>
      </div>

      <div id="pageBody" style="display:none;">
        <div class="card">
          <div class="card-title">3D Design Renders</div>
          <div id="emptyState" style="display:none; padding:10px 0;">
            <p style="font-size:12px; color:var(--text-muted);">No documents uploaded till now.</p>
          </div>
          <div id="filesList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;" onclick="closeLightbox()">
  <img id="lightboxImg" src="" style="max-width:90vw; max-height:90vh; object-fit:contain; border-radius:4px;" />
  <button onclick="closeLightbox()" style="position:fixed;top:20px;right:24px;background:none;border:none;color:white;font-size:28px;cursor:pointer;">×</button>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .cat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  background: var(--teal-light);
  padding: 8px 14px;
  margin: 20px 0 10px;
  border-radius: 4px;
}
.cat-label:first-child { margin-top: 0; }
  .img-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .img-thumb:hover { opacity: 0.85; }
  .img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 12px;
  }
  .btn-outline, .btn-primary {
  min-width: 110px;
  justify-content: center;
  }
  @media (max-width: 768px) {
  .btn-outline, .btn-primary {
    min-width: 50px;
    font-size: 11px;
    padding: 8px 12px;
  }
}
.sidebar {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
}
.sidebar-footer {
  flex-shrink: 0;
}
</style>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});
document.getElementById('signoutBtn').addEventListener('click', async () => {
  await signOut(auth); window.location.href = '../index.html';
});

let clientId = null;
let categories = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../index.html'; return; }
  const adminDoc = await getDoc(doc(db, 'admins', user.uid));
  if (adminDoc.exists()) { window.location.href = 'dashboard.html'; return; }
  clientId = user.uid;
  loadData();
});

function isImage(f) {
  const t = (f.fileType || '').toLowerCase();
  const n = (f.fileName || '').toLowerCase();
  return t.startsWith('image/') || n.endsWith('.jpg') || n.endsWith('.jpeg') || n.endsWith('.png') || n.endsWith('.webp');
}

function loadData() {
  onSnapshot(doc(db, 'clients', clientId), (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    document.getElementById('sidebarClientName').textContent = d.displayName || '—';
    const badge = document.getElementById('statusBadge');
    const status = d.projectStatus || 'Planning';
    badge.textContent = status;
    badge.className = 'badge ' + (status === 'Completed' ? 'badge-completed' : status === 'In Progress' ? 'badge-progress' : 'badge-planning');
    badge.style.display = 'inline-block';
    categories = d.design3dCategories || [];
    applyVisibility(d.visibility || {});
  });

  onSnapshot(collection(db, 'clients', clientId, 'design3d'), (snap) => {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageBody').style.display = 'block';

    const files = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.uploadedAt?.seconds || 0) - (b.uploadedAt?.seconds || 0));

    const container = document.getElementById('filesList');
    const empty = document.getElementById('emptyState');

    if (files.length === 0) {
      empty.style.display = 'block';
      container.innerHTML = '';
      return;
    }

    empty.style.display = 'none';
    container.innerHTML = '';

    const hasCats = categories.length > 0 && files.some(f => f.category);

    if (hasCats) {
      categories.forEach(cat => {
        const catFiles = files.filter(f => f.category === cat);
        if (catFiles.length === 0) return;
        const label = document.createElement('div');
        label.className = 'cat-label';
        label.textContent = cat;
        container.appendChild(label);
        renderFiles(catFiles, container);
      });
      const uncategorized = files.filter(f => !f.category);
      if (uncategorized.length > 0) renderFiles(uncategorized, container);
    } else {
      renderFiles(files, container);
    }
  });
}

function renderFiles(files, container) {
  const imgFiles  = files.filter(f => isImage(f));
  const otherFiles = files.filter(f => !isImage(f));

  // Images in a grid
  if (imgFiles.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'img-grid';
    imgFiles.forEach(f => {
      const date = f.uploadedAt
        ? f.uploadedAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : '';
      const wrap = document.createElement('div');
      wrap.innerHTML = `
        <div style="text-align:right;font-size:10px;color:var(--text-muted);margin-bottom:3px;">${date}</div>
        <img class="img-thumb" src="${f.fileUrl}" alt="${f.fileName}" onclick="openLightbox('${f.fileUrl}')" loading="lazy" />
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.fileName || ''}</div>`;
      grid.appendChild(wrap);
    });
    container.appendChild(grid);
  }

  // PDFs / other files as rows
  otherFiles.forEach(f => {
    const date = f.uploadedAt
      ? f.uploadedAt.toDate().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      : '';
    const wrap = document.createElement('div');
    wrap.innerHTML = `
      <div style="text-align:right;font-size:11px;color:var(--text-muted);margin-bottom:4px;">${date}</div>
      <div class="file-row">
        <div class="file-left">
          <div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div>
            <div class="file-name">${f.fileName || 'File'}</div>
            <div class="file-meta">${f.fileSize || ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
  <a href="${f.fileUrl}" target="_blank" class="btn btn-primary">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    View & Download
  </a>
</div>
      </div>`;
    container.appendChild(wrap);
  });
}

window.openLightbox = function(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  lb.style.display = 'flex';
};
window.closeLightbox = function() {
  document.getElementById('lightbox').style.display = 'none';
  document.getElementById('lightboxImg').src = '';
};

function applyVisibility(vis) {
  const map = { contract:'navContract', moodBoard:'navMoodBoard', design3d:'navDesign3d', quotation:'navQuotation', workSchedule:'navWorkSchedule', payments:'navPayments', questionnaire:'navQuestionnaire' };
  Object.entries(map).forEach(([key, id]) => {
    const el = document.getElementById(id);
    if (el) el.style.display = vis[key] !== false ? 'flex' : 'none';
  });
}

  /* ── Disable browser back/forward ── */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.go(1); // cancel the back navigation by going forward again
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) {
    window.location.reload();
  }
});
</script>
</body>
</html>
